<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Doctors — Smart Clinic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-hospital me-2"></i>Smart Clinic</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="doctors.html">Doctors</a></li>
        <li class="nav-item"><a class="nav-link" href="branches.html">Branches</a></li>
        <li class="nav-item" id="nav-auth-links">
          <a class="nav-link" href="login.html">Login</a>
        </li>
        <li class="nav-item d-none" id="nav-user-info">
          <a class="btn btn-outline-light btn-sm ms-2" href="#" id="nav-dashboard">Dashboard</a>
          <button class="btn btn-danger btn-sm ms-2" onclick="logout()">Logout</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div class="bg-primary text-white py-5">
  <div class="container">
    <h1 class="fw-bold display-5 mb-2"><i class="fa-solid fa-user-doctor me-3"></i>Our Specialists</h1>
    <p class="lead mb-0">Find the right doctor for your needs and book an appointment today.</p>
  </div>
</div>

<!-- Filter Bar -->
<div class="bg-white shadow-sm py-3">
  <div class="container">
    <div class="row g-2 align-items-center">
      <div class="col-md-5">
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
          <input type="text" id="searchInput" class="form-control" placeholder="Search by name or specialization...">
        </div>
      </div>
      <div class="col-md-4">
        <select id="specFilter" class="form-select">
          <option value="">All Specializations</option>
          <option>Cardiology</option><option>Dermatology</option><option>Neurology</option>
          <option>Pediatrics</option><option>Orthopedics</option><option>General Medicine</option>
          <option>Gynecology</option><option>Psychiatry</option><option>ENT</option>
          <option>Ophthalmology</option><option>Dentistry</option><option>Urology</option>
          <option>Endocrinology</option><option>Pulmonology</option><option>Nephrology</option>
          <option>Oncology</option><option>General Surgery</option><option>Rheumatology</option>
          <option>Gastroenterology</option>
        </select>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" onclick="loadDoctors()">
          <i class="fa-solid fa-filter me-1"></i>Filter
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Doctors Grid -->
<div class="container py-5">
  <div class="row g-4" id="doctors-grid">
    <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2 text-muted">Loading doctors…</p></div>
  </div>
</div>

<!-- Book Appointment Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title"><i class="fa-solid fa-calendar-plus me-2"></i>Book Appointment</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="book-alert"></div>
        <p class="text-muted small mb-3">Booking with: <strong id="book-doctor-name"></strong></p>
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Branch <span class="text-danger">*</span></label>
          <select id="book-branch" class="form-select" required>
            <option value="">-- Select a Branch --</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Date & Time <span class="text-danger">*</span></label>
          <input type="datetime-local" id="book-datetime" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Reason for Visit <span class="text-danger">*</span></label>
          <textarea id="book-reason" class="form-control" rows="3" placeholder="Describe your symptoms or reason…" required></textarea>
        </div>
        <input type="hidden" id="book-doctor-id">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary fw-bold" id="bookBtn" onclick="submitBooking()">
          <i class="fa-solid fa-calendar-check me-1"></i>Confirm Booking
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p class="mb-0 fw-bold"><i class="fa-solid fa-hospital me-2"></i>Smart Clinic — Mysuru &copy; 2026</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "/api";
function getUser()  { try { return JSON.parse(localStorage.getItem("user")); } catch { return null; } }
function getToken() { return localStorage.getItem("token"); }
function logout()   { localStorage.clear(); window.location.href = "login.html"; }

// Update nav
const user = getUser();
if (user) {
  document.getElementById("nav-auth-links").classList.add("d-none");
  document.getElementById("nav-user-info").classList.remove("d-none");
  const d = document.getElementById("nav-dashboard");
  d.href = user.role === "admin" ? "dashboard/admin.html" : user.role === "doctor" ? "dashboard/doctor-dashboard.html" : "dashboard/patient-dashboard.html";
}

// Prefill search from URL
const urlSearch = new URLSearchParams(window.location.search).get("search");
if (urlSearch) document.getElementById("searchInput").value = urlSearch;

async function loadDoctors() {
  const grid   = document.getElementById("doctors-grid");
  const search = document.getElementById("searchInput").value.trim();
  const spec   = document.getElementById("specFilter").value;
  grid.innerHTML = `<div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>`;
  try {
    let url = `${API}/doctors?`;
    if (search) url += `search=${encodeURIComponent(search)}&`;
    if (spec)   url += `specialization=${encodeURIComponent(spec)}`;
    const res     = await fetch(url);
    const doctors = await res.json();
    if (!doctors.length) { grid.innerHTML = `<div class="col-12 text-center py-5"><i class="fa-solid fa-user-doctor fa-3x text-muted mb-3 d-block"></i><p class="text-muted">No doctors found.</p></div>`; return; }
    const isPatient = user?.role === "patient";
    grid.innerHTML = doctors.map(d => `
      <div class="col-md-4">
        <div class="card doctor-card shadow-sm h-100">
          <img src="${d.image}" class="card-img-top" style="height:210px;object-fit:cover" onerror="this.src='https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=600'" alt="">
          <div class="card-body d-flex flex-column">
            <h6 class="fw-bold mb-1">${d.user?.name || "Doctor"}</h6>
            <span class="badge bg-primary-subtle text-primary mb-2">${d.specialization}</span>
            <p class="text-muted small mb-1"><i class="fa-solid fa-graduation-cap me-1"></i>${d.education || "MBBS, MD"}</p>
            <p class="text-muted small mb-1"><i class="fa-solid fa-clock me-1"></i>${d.experience} yrs experience</p>
            <p class="text-muted small mb-2"><i class="fa-solid fa-hospital me-1"></i>${d.branch?.name || "Main Branch"}</p>
            <p class="text-muted small mb-3" style="flex:1">${(d.bio||"").substring(0,90)}${d.bio?.length>90?"…":""}</p>
            ${isPatient
              ? `<button class="btn btn-primary w-100 fw-bold" onclick="openBookModal('${d._id}','${d.user?.name}')"><i class="fa-solid fa-calendar-plus me-1"></i>Book Appointment</button>`
              : `<a href="login.html" class="btn btn-outline-primary w-100">Login to Book</a>`}
          </div>
        </div>
      </div>`).join("");
  } catch(err) {
    grid.innerHTML = `<div class="col-12 text-center py-5 text-danger"><i class="fa-solid fa-circle-exclamation fa-2x mb-2 d-block"></i>Error: ${err.message}</div>`;
  }
}

// ── Booking ─────────────────────────────────────────────
let bookModal;
async function openBookModal(doctorId, doctorName) {
  document.getElementById("book-doctor-id").value   = doctorId;
  document.getElementById("book-doctor-name").textContent = doctorName;
  document.getElementById("book-alert").innerHTML   = "";
  document.getElementById("book-datetime").value    = "";
  document.getElementById("book-reason").value      = "";
  // Set min datetime to now
  const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById("book-datetime").min = now.toISOString().slice(0,16);

  const branchSel = document.getElementById("book-branch");
  branchSel.innerHTML = `<option value="">Loading branches…</option>`;
  const bRes = await fetch(`${API}/branches`);
  const branches = await bRes.json();
  branchSel.innerHTML = `<option value="">-- Select a Branch --</option>` +
    branches.map(b => `<option value="${b._id}">${b.name} — ${b.address}</option>`).join("");

  bookModal = new bootstrap.Modal(document.getElementById("bookModal"));
  bookModal.show();
}

async function submitBooking() {
  const doctorId = document.getElementById("book-doctor-id").value;
  const branchId = document.getElementById("book-branch").value;
  const dateTime = document.getElementById("book-datetime").value;
  const reason   = document.getElementById("book-reason").value.trim();
  const alertEl  = document.getElementById("book-alert");
  const btn      = document.getElementById("bookBtn");

  if (!branchId || !dateTime || !reason) {
    alertEl.innerHTML = `<div class="alert alert-danger py-2 small">Please fill all fields.</div>`; return;
  }

  btn.disabled = true; btn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>Booking…`;
  try {
    const res  = await fetch(`${API}/appointments`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
      body: JSON.stringify({ doctorId, branchId, dateTime, reason })
    });
    const data = await res.json();
    if (data.ok) {
      alertEl.innerHTML = `<div class="alert alert-success py-2 small"><i class="fa-solid fa-circle-check me-1"></i>Appointment booked! Check your dashboard.</div>`;
      setTimeout(() => bookModal.hide(), 2000);
    } else {
      alertEl.innerHTML = `<div class="alert alert-danger py-2 small">${data.message}</div>`;
    }
  } catch {
    alertEl.innerHTML = `<div class="alert alert-danger py-2 small">Server error. Try again.</div>`;
  }
  btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-calendar-check me-1"></i>Confirm Booking`;
}

document.getElementById("searchInput").addEventListener("keydown", e => { if(e.key==="Enter") loadDoctors(); });
loadDoctors();
</script>
</body>
</html>
