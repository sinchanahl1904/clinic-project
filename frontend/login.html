<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart healthcare assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-hospital me-2"></i>Smart healthcare assistant</a>
  </div>
</nav>

<div class="auth-bg p-3">
  <div class="card shadow-lg border-0" style="width:100%;max-width:420px">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px">
          <i class="fa-solid fa-right-to-bracket fa-xl text-white"></i>
        </div>
        <h2 class="fw-bold mb-1">Welcome Back</h2>
        <p class="text-muted small">Sign in to manage your appointments</p>
      </div>

      <div id="alert-box"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">
          <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
        </button>
      </form>

      <p class="text-center mt-2 mb-0 small text-muted">
        Don't have an account? <a href="register.html" class="text-decoration-none fw-bold">Register here</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "/api";

function showAlert(msg, type = "danger") {
  document.getElementById("alert-box").innerHTML =
    `<div class="alert alert-${type} alert-dismissible fade show py-2">
       <i class="fa-solid fa-${type==="danger"?"circle-exclamation":"circle-check"} me-2"></i>${msg}
       <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
     </div>`;
}

function togglePwd() {
  const el = document.getElementById("password");
  const show = el.type === "password";
  el.type = show ? "text" : "password";
  document.getElementById("eyeIcon").className = `fa-solid fa-eye${show ? "-slash" : ""}`;
}

document.getElementById("loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn      = document.getElementById("submitBtn");

  if (!email || !password) return showAlert("Please enter email and password.");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify({ name: data.name, email: data.email, role: data.role, userId: data.userId }));
      showAlert("Login successful! Redirecting…", "success");
      setTimeout(() => {
        if (data.role === "admin")        window.location.href = "dashboard/admin.html";
        else if (data.role === "doctor")  window.location.href = "dashboard/doctor-dashboard.html";
        else                              window.location.href = "dashboard/patient-dashboard.html";
      }, 900);
    } else {
      showAlert(data.message || "Invalid email or password.");
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
    }
  } catch {
    showAlert("Cannot connect to server. Is it running on port 5000?");
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>Sign In';
  }
});
</script>
</body>
</html>
