<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Smart healthcare assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-hospital me-2"></i>Smart healthcare assistant</a>
  </div>
</nav>

<div class="auth-bg p-3">
  <div class="card shadow-lg border-0" style="width:100%;max-width:440px">
    <div class="card-body p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px">
          <i class="fa-solid fa-user-plus fa-xl text-white"></i>
        </div>
        <h2 class="fw-bold mb-1">Create Account</h2>
        <p class="text-muted small">Book appointments and manage your care</p>
      </div>

      <div id="alert-box"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user text-muted"></i></span>
            <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-envelope text-muted"></i></span>
            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone <span class="text-muted small fw-normal">(optional)</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-phone text-muted"></i></span>
            <input type="tel" id="phone" class="form-control" placeholder="+91XXXXXXXXXX">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('password',this)">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2 fw-bold" id="submitBtn">
          <i class="fa-solid fa-user-plus me-2"></i>Create Account
        </button>
      </form>

      <p class="text-center mt-3 mb-0 small text-muted">
        Already have an account? <a href="login.html" class="text-decoration-none fw-bold">Sign In</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "/api";

function showAlert(msg, type = "danger") {
  document.getElementById("alert-box").innerHTML =
    `<div class="alert alert-${type} alert-dismissible fade show py-2">
       <i class="fa-solid fa-${type==="danger"?"circle-exclamation":"circle-check"} me-2"></i>${msg}
       <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
     </div>`;
}

function togglePwd(id, btn) {
  const el = document.getElementById(id);
  const show = el.type === "password";
  el.type = show ? "text" : "password";
  btn.querySelector("i").className = `fa-solid fa-eye${show ? "-slash" : ""}`;
}

document.getElementById("registerForm").addEventListener("submit", async e => {
  e.preventDefault();
  const name            = document.getElementById("name").value.trim();
  const email           = document.getElementById("email").value.trim();
  const phone           = document.getElementById("phone").value.trim();
  const password        = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const btn             = document.getElementById("submitBtn");

  if (!name || !email || !password) return showAlert("Please fill in all required fields.");
  if (password !== confirmPassword)  return showAlert("Passwords do not match.");
  if (password.length < 6)           return showAlert("Password must be at least 6 characters.");

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, phone, password, confirmPassword })
    });
    const data = await res.json();

    if (data.ok) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify({ name: data.name, email: data.email, role: data.role, userId: data.userId }));
      showAlert("Account created! Redirecting…", "success");
      setTimeout(() => window.location.href = "dashboard/patient-dashboard.html", 1200);
    } else {
      showAlert(data.message || "Registration failed.");
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
    }
  } catch {
    showAlert("Cannot connect to server. Make sure the server is running.");
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Create Account';
  }
});
</script>
</body>
</html>
